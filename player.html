<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hologram player</title>
<script>if(new URLSearchParams(location.search).get('embed')==='1')document.documentElement.classList.add('embed')</script>
<style>
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,system-ui,Segoe UI,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
 a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}
 .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px}
 #wrap{display:flex;flex-direction:column;align-items:center;padding:20px 16px;max-width:960px;margin:0 auto}
 #header{width:100%;display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
 #title{font-size:1.4rem;font-weight:800;margin:0}
 #meta{color:#8b949e;font-size:12px}
 #stage{position:relative;width:100%;max-width:480px}
 canvas{display:block;width:100%;border-radius:14px;background:#010409;border:1px solid #30363d}
 #canvas{cursor:grab;touch-action:pan-y pinch-zoom}
 #canvas.dragging{cursor:grabbing}
 #canvas:focus-visible{outline:3px solid #58a6ff;outline-offset:3px}
 #orbit-hint{position:absolute;top:42px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;letter-spacing:.02em;color:#e6edf3;background:rgba(1,4,9,0.72);border:1px solid rgba(110,118,129,.45);padding:6px 10px;border-radius:999px;pointer-events:none;white-space:nowrap}
 #orbit-hint.hide{opacity:0}
 #verify{position:absolute;top:8px;right:10px;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;font-family:ui-monospace,Menlo,monospace;color:#3fb950;background:rgba(1,4,9,0.75);padding:2px 7px;border-radius:20px;pointer-events:none}
 #verify.mismatch{color:#f0b429}
 #embed-error{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:18px;text-align:center;color:#ff9b9b;background:rgba(1,4,9,.94);font-size:13px;font-weight:700;overflow-wrap:anywhere;overflow:auto}
 #embed-error[hidden]{display:none}
 #view-controls{position:absolute;left:10px;bottom:10px;display:flex;gap:8px;align-items:flex-end}
 #view-controls .dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:3px}
 #view-controls .zoom{display:flex;flex-direction:column;gap:4px}
 #view-controls button{width:44px;height:44px;padding:0;border-color:rgba(110,118,129,.65);background:rgba(13,17,23,.88);font-size:17px;font-weight:700}
 #view-controls button:hover,#view-controls button:focus-visible{background:#30363d;border-color:#58a6ff}
 #view-up{grid-column:2;grid-row:1} #view-left{grid-column:1;grid-row:2} #view-reset{grid-column:2;grid-row:2}
 #view-right{grid-column:3;grid-row:2} #view-down{grid-column:2;grid-row:3}
 #controls{width:100%;max-width:480px;margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
 button{font:inherit;font-size:12px;cursor:pointer;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:7px;padding:5px 12px}
 button:hover{background:#30363d}
 button:disabled{opacity:.45;cursor:default}
 button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid #58a6ff;outline-offset:2px}
 button.primary{background:#238636;border-color:#238636;color:#fff}
 button.primary:hover{filter:brightness(1.1)}
 .button-link{display:inline-block;font-size:12px;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:7px;padding:5px 12px}
 .button-link:hover{background:#30363d;text-decoration:none}
 .button-link:focus-visible{outline:3px solid #58a6ff;outline-offset:2px}
 #load-row{width:100%;max-width:480px;margin-top:10px;display:flex;gap:6px}
 #load-row input{flex:1;background:#010409;border:1px solid #30363d;border-radius:7px;color:#e6edf3;padding:5px 9px;font:inherit;font-size:12px}
 #info-row{width:100%;max-width:480px;margin-top:8px;font-size:11px;color:#8b949e;display:flex;gap:14px;flex-wrap:wrap}
 #title,#i-title,#i-author,#i-id{min-width:0;max-width:100%;overflow-wrap:anywhere}
 #player-status{width:100%;max-width:480px;min-height:18px;margin-top:6px;font-size:11px;color:#8b949e;overflow-wrap:anywhere}
 #player-status.err{color:#f85149}
 #json-area{width:100%;max-width:480px;margin-top:12px}

 canvas.qr{border-radius:8px;background:#fff;image-rendering:pixelated;display:inline-block}
 #qr-link{word-break:break-all;font-size:10.5px;color:#8b949e;margin-top:4px}
 #share-fallback{width:100%;max-width:480px;margin-top:8px}
 #share-fallback[hidden]{display:none}
 #share-fallback label{display:block;font-size:11px;color:#8b949e;margin-bottom:4px}
 #share-url{width:100%;background:#010409;border:1px solid #30363d;border-radius:7px;color:#e6edf3;padding:7px 9px;font:12px ui-monospace,Menlo,monospace}
 .err{color:#f85149}

  #header{grid-column:1/-1;width:100%}
  #stage,#controls,#load-row,#info-row,#json-area,#qr-wrap{max-width:340px}
 }
 html.embed,html.embed body{width:100%;height:100%;min-height:0;overflow:hidden}
 html.embed #wrap{display:block;width:100%;height:100%;max-width:none;padding:0}
 html.embed #header,html.embed #workbench{display:none!important}
 html.embed #stage{width:100%;height:100%;max-width:none}
 html.embed #canvas{width:100%;height:100%;border:0;border-radius:0}
 @media(max-width:420px){
  #verify{top:7px;right:7px}

 @media(max-width:600px){
  #load-row input,#json-area textarea,#share-url{font-size:16px}
 }
 @media(pointer:coarse){

 }

  #view-controls .dpad{display:none}
  #view-controls .zoom{flex-direction:row}
 }
 @media(max-width:180px),(max-height:140px){
  #view-controls,#orbit-hint{display:none}
 }

<main id="wrap">
 <div id="header">
  <h1 id="title">🌀 hologram</h1>
  <span id="meta" class="mono"></span>
 </div>

 <div id="stage">
  <canvas id="canvas" width="480" height="480" tabindex="0" role="img" aria-label="Interactive 3D organism. Use arrow keys to orbit, plus and minus to zoom, and Home to reset the view."></canvas>
  <div id="orbit-hint">drag or use controls</div>
  <div id="verify" style="display:none"></div>
  <div id="embed-error" role="alert" aria-live="assertive" aria-atomic="true" hidden></div>
  <div id="view-controls" role="group" aria-label="Organism view controls">
   <div class="dpad">
    <button id="view-up" data-view="up" aria-label="Orbit up">↑</button>
    <button id="view-left" data-view="left" aria-label="Orbit left">←</button>
    <button id="view-reset" data-view="reset" aria-label="Reset view">⌂</button>
    <button id="view-right" data-view="right" aria-label="Orbit right">→</button>
    <button id="view-down" data-view="down" aria-label="Orbit down">↓</button>
   </div>
   <div class="zoom">
    <button data-view="zoom-in" aria-label="Zoom in">+</button>
    <button data-view="zoom-out" aria-label="Zoom out">−</button>
    <button id="motion-toggle" aria-label="Pause motion" aria-pressed="false">Ⅱ</button>
   </div>
  </div>
 </div>

 <div id="workbench" style="display:flex;flex-direction:column;gap:0;flex:1;min-width:240px">
  <div id="controls">
  <button id="btn-dl" disabled>↓ download .egg</button>
  <button id="btn-link" disabled>copy link</button>
  <button id="btn-share" disabled>share</button>
  <button id="btn-qr" disabled aria-controls="qr-wrap" aria-expanded="false">QR</button>
    <a class="button-link" id="keep-link" aria-disabled="true" tabindex="-1">Keep in Field Journal · loading…</a>
    <a class="button-link" href="index.html">gallery →</a>
  </div>
  <div id="load-row">
   <input id="cart-url" aria-label="Cartridge URL or JSON" placeholder="cartridge URL or paste JSON…">
   <button class="primary" id="btn-load">load</button>
  </div>
  <div id="info-row">
   <span id="i-title"></span>
   <span id="i-author"></span>
   <span id="i-id" class="mono"></span>
  </div>
  <div id="player-status" role="status" aria-live="polite" aria-atomic="true"></div>
  <div id="json-area">
   <textarea id="cart-json" aria-label="Cartridge JSON" spellcheck="false" placeholder="paste hologram-cartridge/1.0 JSON here…"></textarea>
   <div class="row">
    <button id="btn-apply">apply JSON</button>
    <input type="file" id="file-in" accept=".egg,.json,application/json" style="display:none">
    <button id="btn-file">open file…</button>
   </div>
  </div>
  <div id="qr-wrap" style="display:none">
   <canvas class="qr" id="qr"></canvas>
   <div id="qr-link" class="mono"></div>
  </div>
  <div id="share-fallback" hidden>
   <label for="share-url">Share link — copy manually</label>
   <input id="share-url" readonly>
  </div>
 </div>
</main>

<script type="module">

function pushFace(faces, pts, fill, alpha) { faces.push({ pts, fill, alpha }); }

        throw new Error(`Trait ${key} must be ${integer ? 'an integer ' : ''}between ${min} and ${max}.`);
    };
    inRange('k', 0, 100);
    if (layer.role === 'form') {
      if (layer.shape != null && !['blob', 'star', 'ring', 'segment'].includes(layer.shape))
        throw new Error(`Unsupported form shape: ${layer.shape}.`);
      if (layer.symmetry != null && !['radial', 'bilateral'].includes(layer.symmetry))
        throw new Error(`Unsupported form symmetry: ${layer.symmetry}.`);
      inRange('limbs', 0, 14, true); inRange('segments', 3, 24, true);
      inRange('spikes', 0, 14, true); inRange('body_r', 0, 1); inRange('limb_len', 0, 1);
    } else if (layer.role === 'surface') {
      if (layer.pattern != null && !['solid', 'stripe', 'spot', 'glow'].includes(layer.pattern))
        throw new Error(`Unsupported surface pattern: ${layer.pattern}.`);
      inRange('glow', 0, 1); inRange('opacity', 0, 1);
    } else if (layer.role === 'motion') {
      for (const key of ['breathe', 'drift', 'pulse', 'reach']) inRange(key, 0, 1);
    }
  }
  if (!layers.some(layer => layer.role === 'form') || !layers.some(layer => layer.role === 'surface'))
    throw new Error('Genome needs at least one form and one surface layer.');
  const windows = compose && compose.windows;
  if (windows != null) {
    if (!Array.isArray(windows) || !windows.length || windows.length > 32)
      throw new Error('Genome windows must contain between 1 and 32 entries.');
    let refs = 0;
    for (const windowLayers of windows) {
      if (!Array.isArray(windowLayers) || !windowLayers.length)
        throw new Error('Each genome window must reference at least one layer.');
      refs += windowLayers.length;
      if (refs > 4096 || windowLayers.some(index => !Number.isInteger(index) || index < 0 || index >= layers.length))
        throw new Error('Genome windows contain invalid layer references.');
    }
  } else if (compose && compose.loop != null) {
    throw new Error('Genome compose.loop requires windows.');
  }
  const reachableWindows = windows
    ? (compose.loop ? windows : [windows[0]])
    : [layers.map((_, index) => index)];
  estimateGenomeFaces(layers, reachableWindows);
  return cart;
}

async function readBounded(response, maxBytes = MAX_CART_BYTES, label = 'Cartridge') {
  const declared = Number(response.headers.get('content-length'));
  if (Number.isFinite(declared) && declared > maxBytes)
    throw new Error(`${label} exceeds its size limit.`);
  if (!response.body || !response.body.getReader) {
    const bytes = new Uint8Array(await response.arrayBuffer());
    if (bytes.byteLength > maxBytes)
      throw new Error(`${label} exceeds its size limit.`);
    return decodeUtf8Bytes(bytes, label);
  }
  const reader = response.body.getReader();
  const chunks = [];
  let bytes = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    bytes += value.byteLength;
    if (bytes > maxBytes) {
      await reader.cancel();
      throw new Error(`${label} exceeds its size limit.`);
    }
    chunks.push(value);
  }
  const merged = new Uint8Array(bytes);
  let offset = 0;
  for (const chunk of chunks) { merged.set(chunk, offset); offset += chunk.byteLength; }
  return decodeUtf8Bytes(merged, label);
}

function genomeHasMotion(genome) {
  const compose = genome.compose || {};
  const windows = Array.isArray(compose.windows) ? compose.windows : [];
  const windowCount = compose.loop && windows.length > 1 ? windows.length : 1;
  let moves = false;
  for (let index = 0; index < windowCount; index++) {
    const motion = readGenome(genome, 0, index).motion;
    if (['breathe', 'drift', 'pulse', 'reach'].some(key => Math.abs(motion[key] || 0) > 0.0001)) {
      moves = true;
      break;
    }
  }
  return moves || Boolean(compose.loop && windows.length > 1);
}

function cancelScheduledFrame() {

function requestRender() {
  if (!CART || RAF || MOTION.disposed || !MOTION.visible || !MOTION.onscreen) return;
  RAF = requestAnimationFrame(renderFrame);
}

function renderFrame(timestamp) {
  RAF = null;
  if (!CART || !MOTION.visible || !MOTION.onscreen) {
    MOTION.lastTs = null;
    return;
  }
  const active = animationActive();
  if (active && !VIEW.dragging && MOTION.lastTs != null && timestamp - MOTION.lastTs < 30) {
    requestRender();
    return;
  }
  const dt = MOTION.lastTs == null ? 0 : Math.min(0.1, Math.max(0, (timestamp - MOTION.lastTs) / 1000));
  MOTION.lastTs = timestamp;
  if (active) {
    MOTION.time += dt;
    if (!VIEW.dragging && !VIEW.userMoved) VIEW.autoOrbit += dt * 0.32;
  }
  renderScene(ctx, CART.genome, MOTION.time, VIEW);
  if (active) requestRender();
  else MOTION.lastTs = null;
}

function invalidateRender() {

}

function rememberRenderState() {
  if (!CART || !CURRENT_GENOME_ID) return;
  RENDER_STATES.set(CURRENT_GENOME_ID, {
    time: MOTION.time,
    view: {
      yaw: VIEW.yaw,
      pitch: VIEW.pitch,
      zoom: VIEW.zoom,
      autoOrbit: VIEW.autoOrbit,
      userMoved: VIEW.userMoved
    }
  });
  if (RENDER_STATES.size > 8) RENDER_STATES.delete(RENDER_STATES.keys().next().value);
}

function beginLoad() {
  LOAD_SEQUENCE += 1;
  if (activeFetch) activeFetch.abort();
  if (activeRegistryController) activeRegistryController.abort();
  activeFetch = null;
  activeRegistryController = null;
  return LOAD_SEQUENCE;
}

function describeCartridge(cart, got, match, time = 0) {
  const active = readGenome(cart.genome, time);
  const form = active.form, surface = active.surface, motion = active.motion;
  const title = cart.title || 'Untitled organism';
  const author = cart.author ? ` by ${cart.author}` : '';
  const traits = [
    form.shape || 'unknown form',
    Number.isFinite(form.limbs) ? `${form.limbs} limbs` : '',
    surface.pattern ? `${surface.pattern} surface` : '',
    Number.isFinite(motion.breathe) && motion.breathe > 0 ? 'breathing motion' : ''
  ].filter(Boolean).join(', ');
  const trust = cart.id ? (match ? 'verified' : 'genome ID mismatch') : `computed ID ${got}`;
  return `${title}${author}. ${traits}. ${trust}. Interactive 3D view: use arrow keys to orbit, plus and minus to zoom, and Home to reset.`;
}

function boundedCanvasSize(cssWidth, cssHeight, deviceScale, maxPixels = 1600000, maxDimension = 8192) {
  const width = Math.max(1, cssWidth);
  const height = Math.max(1, cssHeight);
  const scale = Math.min(
    deviceScale || 1,
    2,
    Math.sqrt(maxPixels / (width * height)),
    maxDimension / width,
    maxDimension / height
  );
  let outputWidth = Math.max(1, Math.floor(width * scale));
  let outputHeight = Math.max(1, Math.floor(height * scale));
  if (outputWidth * outputHeight > maxPixels) {
    if (outputWidth >= outputHeight) outputWidth = Math.max(1, Math.floor(maxPixels / outputHeight));
    else outputHeight = Math.max(1, Math.floor(maxPixels / outputWidth));
  }
  return { width: outputWidth, height: outputHeight };
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const { width, height } = boundedCanvasSize(rect.width, rect.height, window.devicePixelRatio || 1);
  if (canvas.width !== width || canvas.height !== height) {
    canvas.width = width;
    canvas.height = height;
    invalidateRender();
  }
}

async function loadCart(input, sequence = beginLoad(), options = {}) {
  const cart = validateCartridge(input);

  if (sequence !== LOAD_SEQUENCE) return null;
  const declared = cart.id || '';

  const match = trust !== 'mismatch';
  const serialized = JSON.stringify(cart, null, 2);

  else Object.assign(nextView, { autoOrbit: 0, userMoved: false, dragging: false, activePointer: null });
  const nextTime = restoredState ? restoredState.time : 0;

    if (CART) {
      try { renderScene(ctx, CART.genome, MOTION.time, VIEW); }
      catch (restoreError) {
        throw new Error(`Could not render this cartridge, and the previous scene could not be restored: ${restoreError.message || restoreError}`);
      }

    }
    throw new Error(`Could not render this cartridge: ${error.message || error}`);
  }
  CART = cart;
  CURRENT_GENOME_ID = got;
  CURRENT_CONTENT_ID = contentId;
  document.getElementById('embed-error').hidden = true;
  document.getElementById('view-controls').style.display = '';
  orbitHintEl.style.display = '';

  setOutputActionsEnabled(true);

  verEl.style.display = 'block';

    verEl.className = 'mono';
  } else if (trust === 'unclaimed') {
    verEl.textContent = got + ' (computed)';
    verEl.className = 'mono';
  } else {
    verEl.textContent = got + ' ≠ ' + declared.slice(0,12) + ' (remix)';

/* ── Loader ───────────────────────────────────────────────────────────────── */
async function loadFromUrl(input, sequence) {
  const url = new URL(input, location.href);
  if (!/^https?:$/.test(url.protocol)) throw new Error('Only HTTP(S) cartridge URLs are supported.');
  const controller = new AbortController();
  activeFetch = controller;
  let timedOut = false;
  const timer = setTimeout(() => { timedOut = true; controller.abort(); }, LOAD_TIMEOUT_MS);
  try {
    const response = await fetch(url.href, {
      signal: controller.signal,
      credentials: url.origin === location.origin ? 'same-origin' : 'omit',
      referrerPolicy: url.origin === location.origin ? 'strict-origin-when-cross-origin' : 'no-referrer'
    });
    if (!response.ok) throw new Error(`HTTP ${response.status} while fetching the cartridge.`);
    const text = (await readBounded(response)).replace(/^\uFEFF/, '');
    if (sequence != null && sequence !== LOAD_SEQUENCE) return null;
    try { return JSON.parse(text); }
    catch (error) { throw new Error(`Cartridge JSON is invalid: ${error.message}`); }
  } catch (error) {
    if (error.name === 'AbortError')
      throw new Error(timedOut ? 'Cartridge request timed out after 15 seconds.' : 'Cartridge request was replaced by a newer load.');
    if (error instanceof TypeError)
      throw new Error('Could not fetch that cartridge. Use an HTTPS URL whose server allows cross-origin (CORS) access.');
    throw error;
  } finally {
    clearTimeout(timer);
    if (activeFetch === controller) activeFetch = null;
  }
}

let registryPromise = null;
function validateRegistry(registry) {
  if (!registry || registry.schema !== 'hologram-registry/1.0' ||
      registry.canonicalization !== 'rapp-canonical-json/1' || !Array.isArray(registry.entries) ||
      !registry.entries.length || registry.entries.length > 256)
    throw new Error('Registry is malformed.');
  const aliases = new Set(), hashes = new Set();
  for (const entry of registry.entries) {
    if (!entry || typeof entry !== 'object' ||
        !['name', 'id', 'pin_path', 'content_sha256'].every(key => typeof entry[key] === 'string'))
      throw new Error('Registry entry is malformed.');
    if (!/^[0-9a-f]{64}$/.test(entry.content_sha256))
      throw new Error(`Registry entry "${entry.name}" has an invalid content hash.`);
    const pin = new URL(entry.pin_path, location.href);
    if (pin.origin !== location.origin || !/^https?:$/.test(pin.protocol))
      throw new Error(`Registry entry "${entry.name}" has an unsafe path.`);
    for (const alias of new Set([entry.name, entry.id])) {
      if (aliases.has(alias)) throw new Error('Registry names and ids must share one unique alias namespace.');
      aliases.add(alias);
    }
    if (hashes.has(entry.content_sha256))
      throw new Error('Registry content hashes must be unique.');
    hashes.add(entry.content_sha256);
  }
  if (!registry.summary || registry.summary.cartridges !== registry.entries.length)
    throw new Error('Registry summary does not match its entries.');
  return registry;
}

function getRegistry() {
  if (!registryPromise) {
    const controller = new AbortController();
    activeRegistryController = controller;
    let timedOut = false;
    const timer = setTimeout(() => { timedOut = true; controller.abort(); }, LOAD_TIMEOUT_MS);
    registryPromise = (async () => {
      const response = await fetch('registry.json', {
        cache: 'no-store',
        signal: controller.signal,
        credentials: 'same-origin',
        referrerPolicy: 'no-referrer'
      });
      if (!response.ok) throw new Error(`Registry returned HTTP ${response.status}.`);
      const text = await readBounded(response, MAX_REGISTRY_BYTES, 'Registry');
      let registry;
      try { registry = JSON.parse(text); }
      catch (error) { throw new Error(`Registry JSON is invalid: ${error.message}`); }
      return validateRegistry(registry);
    })().catch(error => {
      registryPromise = null;
      if (error.name === 'AbortError')
        throw new Error(timedOut ? 'Registry request timed out after 15 seconds.' : 'Registry request was replaced by a newer load.');
      throw error;
    }).finally(() => {
      clearTimeout(timer);
      if (activeRegistryController === controller) activeRegistryController = null;
    });
  }
  return registryPromise;
}

async function makeShareUrl() {
  if (!CART) throw new Error('Load an egg before sharing.');
  const cart = CART;
  const expectedContentId = CURRENT_CONTENT_ID;
  const contentId = await cartridgeContentId(cart);
  if (!expectedContentId || contentId !== expectedContentId || CURRENT_CONTENT_ID !== expectedContentId)
    throw new Error('The organism changed while preparing its link.');
  let registry = null;
  try {
    registry = await getRegistry();
  } catch (error) {
    if (CURRENT_CONTENT_ID !== expectedContentId) throw new Error('The organism changed while preparing its link.');
    setPlayerStatus(`Registry lookup unavailable; using a self-contained link. ${error.message}`);
  }
  if (CURRENT_CONTENT_ID !== expectedContentId) throw new Error('The organism changed while preparing its link.');
  const entry = registry && registry.entries.find(item => item.content_sha256 === contentId);
  if (entry) {
    const url = new URL('player.html', location.href);
    url.searchParams.set('id', entry.name);
    url.searchParams.set('h', contentId);
    if (CURRENT_CONTENT_ID !== expectedContentId) throw new Error('The organism changed while preparing its link.');
    return url.href;
  }
  const url = new URL('player.html#' + b64enc(JSON.stringify(cart)), location.href).href;
  if (new TextEncoder().encode(url).byteLength > MAX_INLINE_URL_BYTES)
    throw new Error('This egg is too large for a reliable link. Download and send the .egg instead.');
  if (CURRENT_CONTENT_ID !== expectedContentId) throw new Error('The organism changed while preparing its link.');
  return url;
}

async function prepareStandaloneShare(contentId) {
  PREPARED_SHARE_URL = null;
  document.getElementById('btn-link').disabled = true;
  document.getElementById('btn-share').disabled = true;
  document.getElementById('btn-qr').disabled = true;
  try {
    const url = await makeShareUrl();
    if (CURRENT_CONTENT_ID !== contentId) return;
    PREPARED_SHARE_URL = url;
    document.getElementById('btn-link').disabled = false;
    document.getElementById('btn-share').disabled = false;
    document.getElementById('btn-link').title = '';
    document.getElementById('btn-qr').title = '';
    const qrTooLarge = new TextEncoder().encode(url).byteLength > 997;
    document.getElementById('btn-qr').disabled = qrTooLarge;
    if (qrTooLarge)
      setPlayerStatus('Link ready, but QR is too large. Use share, copy link, or download the .egg.');
  } catch (error) {
    if (CURRENT_CONTENT_ID !== contentId) return;
    const message = error.message || String(error);
    document.getElementById('btn-share').disabled = false;
    document.getElementById('btn-link').title = message;
    document.getElementById('btn-qr').title = message;
    setPlayerStatus(`Link and QR unavailable. Use share or download the .egg. ${message}`, true);
  }
}

function updateJournalHandoff(cart) {
  const link = document.getElementById('keep-link');
  const fragment = b64enc(JSON.stringify(cart));
  const url = new URL('index.html', location.href);
  url.searchParams.set('keep', '1');
  url.hash = fragment;
  if (new TextEncoder().encode(url.href).byteLength <= MAX_INLINE_URL_BYTES) {
    link.href = url.href;
    link.textContent = 'Keep in Field Journal →';
    link.removeAttribute('aria-disabled');
    link.removeAttribute('tabindex');
  } else {
    link.removeAttribute('href');
    link.textContent = 'Open gallery · download to keep';
    link.setAttribute('aria-disabled', 'true');
    link.setAttribute('tabindex', '-1');
  }
}

async function resolveAndLoad(input) {
  input = (input || '').trim();
  if (!input) return;
  const sequence = beginLoad();
  let cart;
  setPlayerStatus('Loading cartridge...');
  try {
    if (input.replace(/^\uFEFF/, '').startsWith('{')) cart = parseCartridgeText(input);
    else cart = await loadFromUrl(input, sequence);
    if (!cart || sequence !== LOAD_SEQUENCE) return;
    await loadCart(cart, sequence);
  } catch (error) {
    if (sequence !== LOAD_SEQUENCE) return;
    setPlayerStatus(error.message || String(error), true);
  }
}

/* ── Boot ─────────────────────────────────────────────────────────────────── */
(async () => {
  const p = new URLSearchParams(location.search);
  const hashPresent = location.href.includes('#');
  const hash = hashPresent ? location.href.slice(location.href.indexOf('#') + 1) : '';
  const cartParams = p.getAll('cart');
  const idParams = p.getAll('id');
  const hashParams = p.getAll('h');
  const sourceCount = Number(hashPresent) + Number(cartParams.length > 0) + Number(idParams.length > 0);
  const explicitSource = sourceCount > 0 || hashParams.length > 0;
  const bootSequence = beginLoad();
  let cart = null, bootError = '';

  if (sourceCount > 1 || cartParams.length > 1 || idParams.length > 1 || hashParams.length > 1)
    bootError = 'A shared link must contain exactly one egg source.';
  else if (hashParams.length && !idParams.length)
    bootError = 'A registry content hash must be paired with an id.';
  else if (hashPresent && !hash)
    bootError = 'The shared egg fragment is empty.';

  if (!bootError && hashPresent) {
    try { cart = parseCartridgeFragment(hash); }
    catch (error) { bootError = `Shared egg link is invalid: ${error.message}`; }
  }
  if (!bootError && !cart && cartParams.length) {
    try { cart = await loadFromUrl(cartParams[0], bootSequence); }
    catch (error) {
      if (bootSequence !== LOAD_SEQUENCE) return;
      bootError = error.message || String(error);
    }
  }
  if (!bootError && !cart && idParams.length) {
    try {
      const reg = await getRegistry();
      if (bootSequence !== LOAD_SEQUENCE) return;
      const expectedContentId = hashParams.length ? hashParams[0].toLowerCase() : null;
      if (expectedContentId && !/^[0-9a-f]{64}$/i.test(expectedContentId))
        throw new Error('The registry content hash in this link is invalid.');
      if (hashParams.length && !expectedContentId)
        throw new Error('The registry content hash in this link is empty.');
      const entry = (reg.entries || []).find(candidate =>
        candidate.name === idParams[0] || candidate.id === idParams[0]);
      if (!entry) throw new Error(`No registry entry matches "${idParams[0]}".`);
      if (expectedContentId && expectedContentId !== entry.content_sha256)
        throw new Error(`Registry entry "${entry.name}" does not match this shared link.`);
      cart = await loadFromUrl(new URL(entry.pin_path, location.href).href, bootSequence);
      if (bootSequence !== LOAD_SEQUENCE) return;
      const actualContentId = await cartridgeContentId(cart);
      if (actualContentId !== entry.content_sha256 || (expectedContentId && actualContentId !== expectedContentId))
        throw new Error(`Registry content check failed for "${entry.name}".`);
    } catch (error) {
      if (bootSequence !== LOAD_SEQUENCE) return;
      cart = null;
      bootError = error.message || String(error);
    }
  }
  if (bootSequence !== LOAD_SEQUENCE) return;
  if (bootError && explicitSource) {
    showSourceError(bootError);
    return;
  }
  if (!explicitSource && !cart) cart = DEFAULT_CART;

  try {
    await loadCart(cart, bootSequence);
  } catch (error) {
    if (bootSequence !== LOAD_SEQUENCE) return;
    bootError = error.message || String(error);
    if (explicitSource) {
      showSourceError(bootError);
      return;
    }
    if (cart !== DEFAULT_CART) await loadCart(DEFAULT_CART, bootSequence);
  }
  if (bootSequence === LOAD_SEQUENCE && bootError)
    setPlayerStatus(`${bootError} Showing the built-in organism instead.`, true);
})();

/* ── Controls ─────────────────────────────────────────────────────────────── */
document.getElementById('btn-load').onclick = () =>
  resolveAndLoad(document.getElementById('cart-url').value);
document.getElementById('cart-url').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-load').click(); });

document.getElementById('btn-apply').onclick = async () => {
  const sequence = beginLoad();
  try {
    const cart = parseCartridgeText(document.getElementById('cart-json').value);
    await loadCart(cart, sequence);
  } catch (error) {
    if (sequence === LOAD_SEQUENCE) setPlayerStatus(error.message || String(error), true);
  }
};

function safeEggFilename(title, contentId = '') {
  const cleaned = String(title || 'cartridge').normalize('NFKC')
    .replace(/[<>:"/\\|?*\u0000-\u001f]/g, '-')
    .replace(/\s+/g, '-')
    .replace(/^-+|-+$/g, '') || 'cartridge';
  let base = '';
  for (const character of cleaned) {
    if (new TextEncoder().encode(base + character).byteLength > 120) break;
    base += character;
  }
  const suffix = contentId ? '-' + contentId.slice(0, 8) : '';
  return `${base || 'cartridge'}${suffix}.egg`;
}

function canNativeShareFile(file) {
  if (!file || !navigator.canShare) return false;
  try { return navigator.canShare({ files: [file] }); }
  catch { return false; }
}

document.getElementById('btn-dl').onclick = () => {
  if (!CART) return;
  const blob = new Blob([JSON.stringify(CART)], { type: 'application/json' });
  const fileName = safeEggFilename(CART.title, CURRENT_CONTENT_ID);
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: fileName });
  a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 0);
};

document.getElementById('btn-link').onclick = async () => {
  if (!CART) return;
  const btn = document.getElementById('btn-link');
  const cart = CART;
  let url;
  try {
    url = await makeShareUrl();
    if (CART !== cart) throw new Error('The organism changed while preparing its link.');
  } catch (error) {
    if (CART !== cart) return;
    setPlayerStatus(error.message || String(error), true);
    return;
  }
  try {
    if (!navigator.clipboard || !navigator.clipboard.writeText) throw new Error('Clipboard access is unavailable.');
    await navigator.clipboard.writeText(url);
    if (CART !== cart) return;
    document.getElementById('share-fallback').hidden = true;
    btn.textContent = 'copied ✓';
    setPlayerStatus('Share link copied.');
    setTimeout(() => btn.textContent = 'copy link', 1400);
  } catch (error) {
    if (CART !== cart) return;
    const fallback = document.getElementById('share-fallback');
    const input = document.getElementById('share-url');
    input.value = url;
    fallback.hidden = false;
    input.focus();
    input.select();
    setPlayerStatus('Clipboard access failed. The share link is selected for manual copy.', true);
  }
};

document.getElementById('btn-share').onclick = async () => {
  if (!CART) return;
  const cart = CART, contentId = CURRENT_CONTENT_ID, url = PREPARED_SHARE_URL;
  const blob = new Blob([JSON.stringify(cart)], { type: 'application/json' });
  const file = typeof File === 'function'
    ? new File([blob], safeEggFilename(cart.title, contentId), { type: blob.type })
    : null;
  const isCurrent = () => CART === cart && CURRENT_CONTENT_ID === contentId;
  if (!navigator.share) {
    if (url) document.getElementById('btn-link').click();
    else document.getElementById('btn-dl').click();
    return;
  }
  const canShareFile = !url && canNativeShareFile(file);
  const payload = url
    ? {
            title: cart.title || 'Holographic organism',
            text: 'Open this holographic organism in rapp-lantern.',
            url
          }
    : (canShareFile
        ? {
            title: cart.title || 'Holographic organism',
            text: 'Keep this holographic organism as an .egg file.',
            files: [file]
          }
        : null);
  if (payload) {
    try {
      await navigator.share(payload);
      if (isCurrent()) setPlayerStatus(canShareFile ? 'Shared .egg file.' : 'Shared link.');
      return;
    } catch (error) {
      if (error.name === 'AbortError') return;
      if (!isCurrent()) return;
      setPlayerStatus(
        canShareFile ? 'File sharing was unavailable; use download.' : 'Link sharing was unavailable; use copy link.',
        true
      );
      return;
    }
  }
  if (!isCurrent()) return;
  if (url) document.getElementById('btn-link').click();
  else document.getElementById('btn-dl').click();
};

document.getElementById('btn-file').onclick = () => {
  const input = document.getElementById('file-in');
  input.value = '';
  input.click();
};
document.getElementById('file-in').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  const sequence = beginLoad();
  try {
    if (f.size > MAX_CART_BYTES) throw new Error('Cartridge exceeds the 2 MiB limit.');
    const cart = parseCartridgeText(decodeUtf8Bytes(new Uint8Array(await f.arrayBuffer())));
    await loadCart(cart, sequence);
  } catch(error) {
    if (sequence === LOAD_SEQUENCE) setPlayerStatus(error.message || String(error), true);
  }
};

function markOrbitInteraction() {
  VIEW.userMoved = true;
  orbitHintEl.classList.add('hide');
  invalidateRender();
}
function orbitDown(x, y) {
  VIEW.dragging = true;
  VIEW.lastX = x;
  VIEW.lastY = y;
  canvas.classList.add('dragging');
  markOrbitInteraction();
}
function orbitMove(x, y) {
  if (!VIEW.dragging) return;
  const dx = x - VIEW.lastX, dy = y - VIEW.lastY;
  VIEW.lastX = x; VIEW.lastY = y;
  VIEW.yaw -= dx * 0.0105;
  VIEW.pitch = clamp(VIEW.pitch + dy * 0.0075, -0.85, 0.92);
  invalidateRender();
}
function orbitUp() {
  VIEW.dragging = false;
  canvas.classList.remove('dragging');
  VIEW.activePointer = null;
}
function orbitZoom(delta) {
  VIEW.zoom = clamp(VIEW.zoom * Math.exp(-delta * 0.0014), 0.72, 1.9);
  markOrbitInteraction();
}

function resetView() {
  VIEW.yaw = 0.85;
  VIEW.pitch = 0.22;
  VIEW.zoom = 1;
  VIEW.autoOrbit = 0;
  markOrbitInteraction();
}

function applyViewAction(action) {
  const orbitStep = 0.18;
  if (action === 'left') VIEW.yaw += orbitStep;
  else if (action === 'right') VIEW.yaw -= orbitStep;
  else if (action === 'up') VIEW.pitch = clamp(VIEW.pitch - orbitStep, -0.85, 0.92);
  else if (action === 'down') VIEW.pitch = clamp(VIEW.pitch + orbitStep, -0.85, 0.92);
  else if (action === 'zoom-in') orbitZoom(-180);
  else if (action === 'zoom-out') orbitZoom(180);
  else if (action === 'reset') { resetView(); return; }
  markOrbitInteraction();
}

canvas.addEventListener('pointerdown', event => {
  if (VIEW.activePointer != null) return;
  VIEW.activePointer = event.pointerId;
  canvas.setPointerCapture(event.pointerId);
  canvas.focus({ preventScroll: true });
  orbitDown(event.clientX, event.clientY);
});
canvas.addEventListener('pointermove', event => {
  if (event.pointerId === VIEW.activePointer) orbitMove(event.clientX, event.clientY);
});
canvas.addEventListener('pointerup', event => {
  if (event.pointerId === VIEW.activePointer) orbitUp();
});
canvas.addEventListener('pointercancel', event => {
  if (event.pointerId === VIEW.activePointer) orbitUp();
});
canvas.addEventListener('lostpointercapture', event => {
  if (event.pointerId === VIEW.activePointer) orbitUp();
});
canvas.addEventListener('wheel', event => {
  if (event.ctrlKey || document.activeElement !== canvas) return;
  event.preventDefault();
  orbitZoom(event.deltaY);
}, { passive: false });
canvas.addEventListener('keydown', event => {
  const actions = {
    ArrowLeft: 'left', a: 'left', A: 'left',
    ArrowRight: 'right', d: 'right', D: 'right',
    ArrowUp: 'up', w: 'up', W: 'up',
    ArrowDown: 'down', s: 'down', S: 'down',
    '+': 'zoom-in', '=': 'zoom-in',
    '-': 'zoom-out', '_': 'zoom-out',
    Home: 'reset', r: 'reset', R: 'reset'
  };
  const action = actions[event.key];
  if (!action) return;
  event.preventDefault();
  applyViewAction(action);
});
document.querySelectorAll('[data-view]').forEach(button => {
  button.addEventListener('click', () => {
    applyViewAction(button.dataset.view);
  });
});
if (matchMedia('(pointer: coarse)').matches) orbitHintEl.textContent = 'swipe sideways or use controls';

// Drag-and-drop
function postDropToHost(message) {
  if (_pmPort) {
    _pmPort.postMessage(message);
    return true;
  }
  if (_directHost) {
    _directHost.source.postMessage(message, _directHost.origin);
    return true;
  }
  return false;
}

canvas.addEventListener('dragover', e => e.preventDefault());
let dropSequence = 0;
document.getElementById('canvas').addEventListener('drop', async e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if (!f) return;
  const embedded = document.documentElement.classList.contains('embed') || Boolean(_pmPort || _directHost);
  const dropId = `drop-${Date.now()}-${++dropSequence}`;
  const sequence = embedded ? null : beginLoad();
  try {
    if (embedded) {
      if (!postDropToHost({ type: 'drop-started', version: PROTOCOL_VERSION, dropId }))
        throw new Error('The embedding page is not ready to receive this egg.');
    }
    if (f.size > MAX_CART_BYTES) throw new Error('Cartridge exceeds the 2 MiB limit.');
    const cart = parseCartridgeText(decodeUtf8Bytes(new Uint8Array(await f.arrayBuffer())));
    if (!embedded && sequence !== LOAD_SEQUENCE) return;
    if (embedded) {
      postDropToHost({
        type: 'cartridge-dropped',
        version: PROTOCOL_VERSION,
        dropId,
        name: f.name.replace(/\.(egg|json)$/i, ''),
        cart
      });
    } else {
      await loadCart(cart, sequence);
    }
  } catch(error) {
    if (embedded || sequence === LOAD_SEQUENCE) {
      const message = error.message || String(error);
      if (embedded && postDropToHost({ type: 'drop-error', version: PROTOCOL_VERSION, dropId, message }))
        return;
      else setPlayerStatus(message, true);
    }
  }
});

// QR
let qrMod = null;
document.getElementById('btn-qr').onclick = async () => {
  if (!CART) return;
  const cart = CART;
  const wrap = document.getElementById('qr-wrap');
  if (wrap.style.display === 'block') {
    wrap.style.display = 'none';
    document.getElementById('btn-qr').setAttribute('aria-expanded', 'false');
    setPlayerStatus('QR code hidden.');
    return;
  }
  if (!qrMod) {
    try { qrMod = await import('./qr.mjs'); }
    catch (error) {
      if (CART !== cart) return;
      setPlayerStatus(`QR module unavailable: ${error.message}`, true);
      return;
    }
  }
  if (CART !== cart) return;
  let url, code;
  try {
    url = await makeShareUrl();
    if (CART !== cart) throw new Error('The organism changed while preparing its QR code.');
    code = qrMod.qr(url, { ecl: 'M' });
  } catch (error) {
    if (CART !== cart) return;
    setPlayerStatus(error.message || String(error), true);
    return;
  }
  if (CART !== cart) return;
  const { size, modules } = code;
  const q = 4, scale = Math.max(2, Math.floor(240 / (size + 2 * q))), dim = (size + 2 * q) * scale;
  const qc = document.getElementById('qr'); qc.width = dim; qc.height = dim;
  const qx = qc.getContext('2d');
  qx.fillStyle = '#fff'; qx.fillRect(0, 0, dim, dim);
  qx.fillStyle = '#000';
  for (let y = 0; y < size; y++) for (let x = 0; x < size; x++)
    if (modules[y][x]) qx.fillRect((x+q)*scale, (y+q)*scale, scale, scale);
  document.getElementById('qr-link').textContent = url;
  wrap.style.display = 'block';
  document.getElementById('btn-qr').setAttribute('aria-expanded', 'true');
  setPlayerStatus('QR code ready to scan.');
};

/* ── postMessage housing protocol ────────────────────────────────────────── */
// Accepts {type:'hologram-init'} from a host page that embeds this player in a
// sandboxed iframe (sandbox="allow-scripts"). Replies {type:'ready'} on the
// MessageChannel port, then accepts {type:'load-cartridge', cart:{...}} and
// replies with a load-scoped rendered/error event plus legacy trust events.
async function handleIncomingCartridge(message, send) {
  try {
    const result = await loadCart(message.cart, undefined, { restore: Boolean(message.restore) });
    if (!result) {
      send({ type: 'error', version: PROTOCOL_VERSION, loadId: message.loadId, message: 'Load was superseded by a newer cartridge.' });
      return;
    }
    send({ type: 'rendered', version: PROTOCOL_VERSION, loadId: message.loadId, id: result.id, contentId: result.contentId, declared: result.declared, match: result.match, trust: result.trust });
    if (result.match) send({ type: 'hatched', version: PROTOCOL_VERSION, id: result.id, trust: result.trust });
    else send({ type: 'hash-mismatch', version: PROTOCOL_VERSION, got: result.id, declared: result.declared });
  } catch (error) {
    const messageText = error.message || String(error);
    setPlayerStatus(messageText, true);
    send({ type: 'error', version: PROTOCOL_VERSION, loadId: message.loadId, message: messageText });
  }
}

async function handlePrepareShare(message, send) {
  try {
    if (typeof message.requestId !== 'string' || !message.requestId || message.requestId.length > 128)
      throw new Error('prepare-share requires a nonempty requestId of at most 128 characters.');
    if (!CART || typeof message.contentId !== 'string' || message.contentId !== CURRENT_CONTENT_ID)
      throw new Error('The requested specimen is not the currently confirmed cartridge.');
    const url = await makeShareUrl();
    if (CURRENT_CONTENT_ID !== message.contentId)
      throw new Error('The specimen changed while preparing sharing.');
    send({
      type: 'share-ready',
      version: PROTOCOL_VERSION,
      requestId: message.requestId,
      contentId: CURRENT_CONTENT_ID,
      url,
      qrEligible: new TextEncoder().encode(url).byteLength <= 997
    });
  } catch (error) {
    send({
      type: 'share-error',
      version: PROTOCOL_VERSION,
      requestId: typeof message.requestId === 'string' ? message.requestId : '',
      message: error.message || String(error)
    });
  }
}

function handleProtocolMessage(message, send, dispose) {
  if (!message || typeof message !== 'object') {
    send({ type: 'protocol-error', version: PROTOCOL_VERSION, message: 'Protocol messages must be objects.' });
    return;
  }
  const version = message.version == null ? PROTOCOL_VERSION : message.version;
  if (version !== PROTOCOL_VERSION) {
    send({ type: 'protocol-error', version: PROTOCOL_VERSION, message: `Unsupported protocol version: ${version}.` });
    return;
  }
  if (message.type === 'cancel-loads') {
    beginLoad();
    send({ type: 'cancelled', version: PROTOCOL_VERSION });
    return;
  }
  if (message.type === 'dispose') {
    MOTION.disposed = true;
    beginLoad();
    cancelScheduledFrame();
    send({ type: 'disposed', version: PROTOCOL_VERSION });
    dispose && dispose();
    return;
  }
  if (message.type === 'load-cartridge') {
    const loadId = typeof message.loadId === 'string' ? message.loadId : '';
    if (!loadId || loadId.length > 128 || !message.cart || typeof message.cart !== 'object') {
      send({
        type: 'error',
        version: PROTOCOL_VERSION,
        loadId,
        message: 'load-cartridge requires a nonempty loadId and cartridge object.'
      });
      return;
    }
    MOTION.disposed = false;
    handleIncomingCartridge(message, send);
    return;
  }
  if (message.type === 'prepare-share') {
    handlePrepareShare(message, send);
    return;
  }
  send({
    type: 'protocol-error',
    version: PROTOCOL_VERSION,
    requestId: typeof message.requestId === 'string' ? message.requestId : '',
    loadId: typeof message.loadId === 'string' ? message.loadId : '',
    message: `Unknown protocol command: ${String(message.type || '')}.`
  });
}

window.addEventListener('message', e => {
  if (window.parent === window) return;
  if (e.source !== window.parent) return;
  if (e.data && typeof e.data === 'object' && e.data.type === 'hologram-init') {
    const port = e.ports[0] || null;
    if (!port) return;
    const version = e.data.version == null ? PROTOCOL_VERSION : e.data.version;
    if (version !== PROTOCOL_VERSION) {
      port.postMessage({ type: 'protocol-error', version: PROTOCOL_VERSION, message: `Unsupported protocol version: ${version}.` });
      port.close();
      return;
    }
    if (_pmPort) {
      beginLoad();
      _pmPort.onmessage = null;
      _pmPort.close();
    }
    _directHost = null;
    MOTION.disposed = false;
    _pmPort = port;
    const send = response => port.postMessage(response);
    const dispose = () => {
      if (_pmPort === port) _pmPort = null;
      port.onmessage = null;
      port.close();
    };
    port.onmessage = event => handleProtocolMessage(event.data, send, dispose);
    port.start && port.start();
    port.postMessage({
      type: 'ready',
      version: PROTOCOL_VERSION,
      capabilities: ['load-cartridge', 'cancel-loads', 'dispose', 'transactional-render', 'prepare-share', 'forward-drop']
    });
    invalidateRender();
    return;
  }
  const targetOrigin = e.origin === 'null' ? '*' : e.origin;
  if (e.data && typeof e.data === 'object' && e.data.type === 'load-cartridge')
    _directHost = { source: e.source, origin: targetOrigin };
  const send = response => e.source.postMessage(response, targetOrigin);
  handleProtocolMessage(e.data, send, () => { _directHost = null; });
});
