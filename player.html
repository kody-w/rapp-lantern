<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hologram player</title>
<script>if(new URLSearchParams(location.search).get('embed')==='1')document.documentElement.classList.add('embed')</script>
<style>
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,system-ui,Segoe UI,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
 a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}
 .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px}
 #wrap{display:flex;flex-direction:column;align-items:center;padding:20px 16px;max-width:960px;margin:0 auto}
 #header{width:100%;display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
 #title{font-size:1.4rem;font-weight:800;margin:0}
 #meta{color:#8b949e;font-size:12px}
 #stage{position:relative;width:100%;max-width:480px}
 canvas{display:block;width:100%;border-radius:14px;background:#010409;border:1px solid #30363d}
 #canvas{cursor:grab;touch-action:pan-y}

 #canvas:focus-visible{outline:3px solid #58a6ff;outline-offset:3px}
 #orbit-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;letter-spacing:.02em;color:#e6edf3;background:rgba(1,4,9,0.72);border:1px solid rgba(110,118,129,.45);padding:6px 10px;border-radius:999px;pointer-events:none;white-space:nowrap}
 #orbit-hint.hide{opacity:0}
 #verify{position:absolute;bottom:8px;right:10px;font-size:10px;font-family:ui-monospace,Menlo,monospace;color:#3fb950;background:rgba(1,4,9,0.75);padding:2px 7px;border-radius:20px;pointer-events:none}
 #verify.mismatch{color:#f0b429}
 #view-controls{position:absolute;left:10px;bottom:10px;display:flex;gap:8px;align-items:flex-end}
 #view-controls .dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:3px}
 #view-controls .zoom{display:flex;flex-direction:column;gap:4px}
 #view-controls button{width:44px;height:44px;padding:0;border-color:rgba(110,118,129,.65);background:rgba(13,17,23,.88);font-size:17px;font-weight:700}
 #view-controls button:hover,#view-controls button:focus-visible{background:#30363d;border-color:#58a6ff}
 #view-up{grid-column:2;grid-row:1} #view-left{grid-column:1;grid-row:2} #view-reset{grid-column:2;grid-row:2}
 #view-right{grid-column:3;grid-row:2} #view-down{grid-column:2;grid-row:3}
 #controls{width:100%;max-width:480px;margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
 button{font:inherit;font-size:12px;cursor:pointer;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:7px;padding:5px 12px}
 button:hover{background:#30363d}

 button.primary{background:#238636;border-color:#238636;color:#fff}

<div id="wrap">
 <div id="header">
  <h1 id="title">🌀 hologram</h1>
  <span id="meta" class="mono"></span>
 </div>

 <div id="stage">
  <canvas id="canvas" width="480" height="480" tabindex="0" role="img" aria-label="Interactive 3D organism. Use arrow keys to orbit, plus and minus to zoom, and Home to reset the view."></canvas>
  <div id="orbit-hint">drag or use controls</div>
  <div id="verify" style="display:none"></div>
  <div id="view-controls" role="group" aria-label="Organism view controls">
   <div class="dpad">
    <button id="view-up" data-view="up" aria-label="Orbit up">↑</button>
    <button id="view-left" data-view="left" aria-label="Orbit left">←</button>
    <button id="view-reset" data-view="reset" aria-label="Reset view">⌂</button>
    <button id="view-right" data-view="right" aria-label="Orbit right">→</button>
    <button id="view-down" data-view="down" aria-label="Orbit down">↓</button>
   </div>
   <div class="zoom">
    <button data-view="zoom-in" aria-label="Zoom in">+</button>
    <button data-view="zoom-out" aria-label="Zoom out">−</button>
   </div>
  </div>
 </div>

 <div id="workbench" style="display:flex;flex-direction:column;gap:0;flex:1;min-width:240px">
  <div id="controls">
   <button id="btn-dl">↓ download .egg</button>
   <button id="btn-link">copy link</button>
   <button id="btn-qr">QR</button>
    <a class="button-link" href="index.html">gallery →</a>
  </div>
  <div id="load-row">
   <input id="cart-url" aria-label="Cartridge URL or JSON" placeholder="cartridge URL or paste JSON…">
   <button class="primary" id="btn-load">load</button>
  </div>
  <div id="info-row">
   <span id="i-title"></span>
   <span id="i-author"></span>
   <span id="i-id" class="mono"></span>
  </div>
  <div id="player-status" role="status" aria-live="polite"></div>
  <div id="json-area">
   <textarea id="cart-json" aria-label="Cartridge JSON" spellcheck="false" placeholder="paste hologram-cartridge/1.0 JSON here…"></textarea>
   <div class="row">
    <button id="btn-apply">apply JSON</button>
    <input type="file" id="file-in" accept=".egg,.json,application/json" style="display:none">
    <button id="btn-file">open file…</button>
   </div>
  </div>
  <div id="qr-wrap" style="display:none">
   <canvas class="qr" id="qr"></canvas>
   <div id="qr-link" class="mono"></div>
  </div>
  <div id="share-fallback" hidden>
   <label for="share-url">Share link — copy manually</label>
   <input id="share-url" readonly>
  </div>
 </div>
</div>

<script type="module">

/* ── Bounded cartridge gate ──────────────────────────────────────────────── */
const MAX_CART_BYTES = 2 * 1024 * 1024;
const LOAD_TIMEOUT_MS = 15000;
const MAX_INLINE_URL_BYTES = 12000;
const PROTOCOL_VERSION = 1;

function validateCartridge(cart) {
  if (!cart || typeof cart !== 'object' || Array.isArray(cart))
    throw new Error('Expected a hologram-cartridge/1.0 object.');
  let nodes = 0;
  const stack = new WeakSet();
  const inspect = (value, depth) => {
    if (depth > 32) throw new Error('Cartridge nesting is too deep.');
    const type = typeof value;
    if (value === null || type === 'string' || type === 'boolean') return;
    if (type === 'number' && !Number.isFinite(value))
      throw new Error('Cartridge numbers must be finite.');
    if (type === 'number') return;
    if (type !== 'object') throw new Error('Cartridge data must contain only JSON values.');
    if (!Array.isArray(value) && Object.prototype.toString.call(value) !== '[object Object]')
      throw new Error('Cartridge objects must be plain JSON objects.');
    if (stack.has(value)) throw new Error('Cartridge data cannot contain cycles.');
    if (++nodes > 100000) throw new Error('Cartridge is too complex.');
    stack.add(value);
    for (const child of Array.isArray(value) ? value : Object.values(value)) inspect(child, depth + 1);
    stack.delete(value);
  };
  inspect(cart, 0);
  const serialized = JSON.stringify(cart);
  if (new TextEncoder().encode(serialized).byteLength > MAX_CART_BYTES)
    throw new Error('Cartridge exceeds the 2 MiB limit.');
  if (cart.schema !== 'hologram-cartridge/1.0')
    throw new Error('Expected schema hologram-cartridge/1.0.');
  for (const key of ['id', 'title', 'author', 'sig']) {
    if (cart[key] != null && typeof cart[key] !== 'string')
      throw new Error(`Cartridge ${key} must be a string.`);
  }
  if (cart.id && (cart.id.length > 256 || /[\u0000-\u001f]/.test(cart.id)))
    throw new Error('Cartridge id is invalid.');
  if (cart.parents != null && (!Array.isArray(cart.parents) || cart.parents.length > 128 ||
      cart.parents.some(parent => typeof parent !== 'string')))
    throw new Error('Cartridge parents must be an array of strings.');

  if (!Array.isArray(layers) || !layers.length || layers.length > 128)
    throw new Error('Genome layers must contain between 1 and 128 entries.');
  const numericKeys = new Set(['k', 'limbs', 'segments', 'body_r', 'limb_len', 'spikes', 'glow', 'opacity', 'breathe', 'drift', 'pulse', 'reach']);
  for (const layer of layers) {
    if (!layer || typeof layer !== 'object' || Array.isArray(layer) || typeof layer.role !== 'string')
      throw new Error('Every genome layer needs a role.');
    for (const key of numericKeys) {
      if (layer[key] != null && (!Number.isFinite(layer[key]) || Math.abs(layer[key]) > 10000))
        throw new Error(`Invalid numeric trait: ${key}.`);
    }
    if (layer.palette != null) {
      if (!Array.isArray(layer.palette) || layer.palette.length > 64 ||
          layer.palette.some(color => typeof color !== 'string' || !/^#[0-9a-f]{3}(?:[0-9a-f]{3})?$/i.test(color)))
        throw new Error('Surface palettes must contain at most 64 hex colors.');
    }
  }
  const windows = cart.genome.compose && cart.genome.compose.windows;
  if (windows != null) {
    if (!Array.isArray(windows)) throw new Error('Genome windows must be an array.');
    let refs = 0;
    for (const windowLayers of windows) {
      if (!Array.isArray(windowLayers)) throw new Error('Each genome window must be an array.');
      refs += windowLayers.length;
      if (refs > 4096 || windowLayers.some(index => !Number.isInteger(index) || index < 0 || index >= layers.length))
        throw new Error('Genome windows contain invalid layer references.');
    }

async function readBounded(response) {
  const declared = Number(response.headers.get('content-length'));
  if (Number.isFinite(declared) && declared > MAX_CART_BYTES)
    throw new Error('Cartridge exceeds the 2 MiB limit.');
  if (!response.body || !response.body.getReader) {
    const text = await response.text();
    if (new TextEncoder().encode(text).byteLength > MAX_CART_BYTES)
      throw new Error('Cartridge exceeds the 2 MiB limit.');
    return text;
  }
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let bytes = 0, text = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    bytes += value.byteLength;
    if (bytes > MAX_CART_BYTES) {
      await reader.cancel();
      throw new Error('Cartridge exceeds the 2 MiB limit.');
    }
    text += decoder.decode(value, { stream: true });
  }
  return text + decoder.decode();
}

async function loadFromUrl(input, sequence) {
  const url = new URL(input, location.href);
  if (!/^https?:$/.test(url.protocol)) throw new Error('Only HTTP(S) cartridge URLs are supported.');
  const controller = new AbortController();
  activeFetch = controller;
  let timedOut = false;
  const timer = setTimeout(() => { timedOut = true; controller.abort(); }, LOAD_TIMEOUT_MS);
  try {
    const response = await fetch(url.href, {
      signal: controller.signal,
      credentials: url.origin === location.origin ? 'same-origin' : 'omit',
      referrerPolicy: url.origin === location.origin ? 'strict-origin-when-cross-origin' : 'no-referrer'
    });
    if (!response.ok) throw new Error(`HTTP ${response.status} while fetching the cartridge.`);
    const text = (await readBounded(response)).replace(/^\uFEFF/, '');
    if (sequence != null && sequence !== LOAD_SEQUENCE) return null;
    try { return JSON.parse(text); }
    catch (error) { throw new Error(`Cartridge JSON is invalid: ${error.message}`); }
  } catch (error) {
    if (error.name === 'AbortError')
      throw new Error(timedOut ? 'Cartridge request timed out after 15 seconds.' : 'Cartridge request was replaced by a newer load.');
    throw error;
  } finally {
    clearTimeout(timer);
    if (activeFetch === controller) activeFetch = null;
  }
}

  }
  if (CART !== cart) throw new Error('The organism changed while preparing its link.');
  const entry = registry && registry.entries.find(item => item.content_sha256 === contentId);
  if (entry) {
    const url = new URL('player.html', location.href);
    url.searchParams.set('id', entry.name);
    url.searchParams.set('h', contentId);
    if (CART !== cart) throw new Error('The organism changed while preparing its link.');
    return url.href;
  }
  const url = new URL('player.html#' + b64enc(JSON.stringify(cart)), location.href).href;
  if (new TextEncoder().encode(url).byteLength > MAX_INLINE_URL_BYTES)
    throw new Error('This egg is too large for a reliable link. Download and send the .egg instead.');
  if (CART !== cart) throw new Error('The organism changed while preparing its link.');
  return url;
}

async function resolveAndLoad(input) {
  input = (input || '').trim();
  if (!input) return;
  const sequence = beginLoad();
  let cart;
  setPlayerStatus('Loading cartridge...');
  try {
    if (input.replace(/^\uFEFF/, '').startsWith('{')) cart = JSON.parse(input.replace(/^\uFEFF/, ''));
    else cart = await loadFromUrl(input, sequence);
    if (!cart || sequence !== LOAD_SEQUENCE) return;
    await loadCart(cart, sequence);
  } catch (error) {
    if (sequence !== LOAD_SEQUENCE) return;
    setPlayerStatus(error.message || String(error), true);
  }
}

/* ── Boot ─────────────────────────────────────────────────────────────────── */
(async () => {
  const p = new URLSearchParams(location.search);
  const hash = (location.hash || '').slice(1);
  const bootSequence = beginLoad();
  let cart = null, bootError = '';

  if (hash) {
    try { cart = JSON.parse(b64dec(hash)); }
    catch (error) { bootError = `Shared egg link is invalid: ${error.message}`; }
  }
  if (!cart && p.has('cart')) {
    try { cart = await loadFromUrl(p.get('cart'), bootSequence); }
    catch (error) {
      if (bootSequence !== LOAD_SEQUENCE) return;
      bootError = error.message || String(error);
    }
  }
  if (!cart && p.has('id')) {
    try {
      const reg = await getRegistry();
      if (bootSequence !== LOAD_SEQUENCE) return;
      const entry = (reg.entries || []).find(e => e.name === p.get('id') || e.id === p.get('id'));
      if (!entry) throw new Error(`No registry entry matches "${p.get('id')}".`);
      const expectedContentId = p.get('h') && p.get('h').toLowerCase();
      if (expectedContentId && !/^[0-9a-f]{64}$/i.test(expectedContentId))
        throw new Error('The registry content hash in this link is invalid.');
      if (expectedContentId && expectedContentId !== entry.content_sha256)
        throw new Error(`Registry entry "${entry.name}" no longer matches this shared link.`);
      cart = await loadFromUrl(new URL(entry.pin_path, location.href).href, bootSequence);
      if (bootSequence !== LOAD_SEQUENCE) return;
      const actualContentId = await cartridgeContentId(cart);
      if (actualContentId !== entry.content_sha256 || (expectedContentId && actualContentId !== expectedContentId))
        throw new Error(`Registry content check failed for "${entry.name}".`);
    } catch (error) {
      if (bootSequence !== LOAD_SEQUENCE) return;
      cart = null;
      bootError = error.message || String(error);
    }
  }
  if (bootSequence !== LOAD_SEQUENCE) return;
  if (!cart) cart = DEFAULT_CART;

  try {
    await loadCart(cart, bootSequence);
  } catch (error) {
    if (bootSequence !== LOAD_SEQUENCE) return;
    bootError = error.message || String(error);
    if (cart !== DEFAULT_CART) await loadCart(DEFAULT_CART, bootSequence);
  }
  if (bootSequence === LOAD_SEQUENCE && bootError)
    setPlayerStatus(`${bootError} Showing the built-in organism instead.`, true);
})();

function markOrbitInteraction() {
  VIEW.userMoved = true;
  orbitHintEl.classList.add('hide');
}
function orbitDown(x, y) {
  VIEW.dragging = true;
  VIEW.lastX = x;
  VIEW.lastY = y;
  canvas.classList.add('dragging');
  markOrbitInteraction();
}
function orbitMove(x, y) {
  if (!VIEW.dragging) return;
  const dx = x - VIEW.lastX, dy = y - VIEW.lastY;
  VIEW.lastX = x; VIEW.lastY = y;
  VIEW.yaw -= dx * 0.0105;
  VIEW.pitch = clamp(VIEW.pitch + dy * 0.0075, -0.85, 0.92);
}
function orbitUp() {
  VIEW.dragging = false;
  canvas.classList.remove('dragging');
  VIEW.activePointer = null;
}
function orbitZoom(delta) {
  VIEW.zoom = clamp(VIEW.zoom * Math.exp(-delta * 0.0014), 0.72, 1.9);
  markOrbitInteraction();
}

function resetView() {
  VIEW.yaw = 0.85;
  VIEW.pitch = 0.22;
  VIEW.zoom = 1;
  VIEW.autoOrbit = 0;
  markOrbitInteraction();
}

function applyViewAction(action) {
  const orbitStep = 0.18;
  if (action === 'left') VIEW.yaw += orbitStep;
  else if (action === 'right') VIEW.yaw -= orbitStep;
  else if (action === 'up') VIEW.pitch = clamp(VIEW.pitch - orbitStep, -0.85, 0.92);
  else if (action === 'down') VIEW.pitch = clamp(VIEW.pitch + orbitStep, -0.85, 0.92);
  else if (action === 'zoom-in') orbitZoom(-180);
  else if (action === 'zoom-out') orbitZoom(180);
  else if (action === 'reset') { resetView(); return; }
  markOrbitInteraction();
}

canvas.addEventListener('pointerdown', event => {
  if (VIEW.activePointer != null) return;
  VIEW.activePointer = event.pointerId;
  canvas.setPointerCapture(event.pointerId);
  canvas.focus({ preventScroll: true });
  orbitDown(event.clientX, event.clientY);
});
canvas.addEventListener('pointermove', event => {
  if (event.pointerId === VIEW.activePointer) orbitMove(event.clientX, event.clientY);
});
canvas.addEventListener('pointerup', event => {
  if (event.pointerId === VIEW.activePointer) orbitUp();
});
canvas.addEventListener('pointercancel', event => {
  if (event.pointerId === VIEW.activePointer) orbitUp();
});
canvas.addEventListener('wheel', event => {
  if (document.activeElement !== canvas && !event.ctrlKey) return;
  event.preventDefault();
  orbitZoom(event.deltaY);
}, { passive: false });
canvas.addEventListener('keydown', event => {
  const actions = {
    ArrowLeft: 'left', a: 'left', A: 'left',
    ArrowRight: 'right', d: 'right', D: 'right',
    ArrowUp: 'up', w: 'up', W: 'up',
    ArrowDown: 'down', s: 'down', S: 'down',
    '+': 'zoom-in', '=': 'zoom-in',
    '-': 'zoom-out', '_': 'zoom-out',
    Home: 'reset', r: 'reset', R: 'reset'
  };
  const action = actions[event.key];
  if (!action) return;
  event.preventDefault();
  applyViewAction(action);
});
document.querySelectorAll('[data-view]').forEach(button => {
  button.addEventListener('click', () => {
    applyViewAction(button.dataset.view);
    canvas.focus({ preventScroll: true });
  });
});
if (matchMedia('(pointer: coarse)').matches) orbitHintEl.textContent = 'swipe sideways or use controls';

// Drag-and-drop
canvas.addEventListener('dragover', e => e.preventDefault());
document.getElementById('canvas').addEventListener('drop', async e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if (!f) return;
  const sequence = beginLoad();
  try {
    if (f.size > MAX_CART_BYTES) throw new Error('Cartridge exceeds the 2 MiB limit.');
    await loadCart(JSON.parse((await f.text()).replace(/^\uFEFF/, '')), sequence);
  } catch(error) {
    if (sequence === LOAD_SEQUENCE) setPlayerStatus(error.message || String(error), true);
  }
});

// QR
let qrMod = null;
document.getElementById('btn-qr').onclick = async () => {
  if (!CART) return;
  const cart = CART;
  const wrap = document.getElementById('qr-wrap');
  if (wrap.style.display === 'block') { wrap.style.display = 'none'; return; }
  if (!qrMod) {
    try { qrMod = await import('./qr.mjs'); }
    catch (error) {
      if (CART !== cart) return;
      setPlayerStatus(`QR module unavailable: ${error.message}`, true);
      return;
    }
  }
  if (CART !== cart) return;
  let url, code;
  try {
    url = await makeShareUrl();
    if (CART !== cart) throw new Error('The organism changed while preparing its QR code.');
    code = qrMod.qr(url, { ecl: 'M' });
  } catch (error) {
    if (CART !== cart) return;
    setPlayerStatus(error.message || String(error), true);
    return;
  }
  if (CART !== cart) return;
  const { size, modules } = code;
  const q = 4, scale = Math.max(2, Math.floor(240 / (size + 2 * q))), dim = (size + 2 * q) * scale;
  const qc = document.getElementById('qr'); qc.width = dim; qc.height = dim;
  const qx = qc.getContext('2d');
  qx.fillStyle = '#fff'; qx.fillRect(0, 0, dim, dim);
  qx.fillStyle = '#000';
  for (let y = 0; y < size; y++) for (let x = 0; x < size; x++)
    if (modules[y][x]) qx.fillRect((x+q)*scale, (y+q)*scale, scale, scale);
  document.getElementById('qr-link').textContent = url;
  wrap.style.display = 'block';
  setPlayerStatus('QR code ready to scan.');
};

/* ── postMessage housing protocol ────────────────────────────────────────── */
// Accepts {type:'hologram-init'} from a host page that embeds this player in a
// sandboxed iframe (sandbox="allow-scripts"). Replies {type:'ready'} on the
// MessageChannel port, then accepts {type:'load-cartridge', cart:{...}} and
// replies with a load-scoped rendered/error event plus legacy trust events.
async function handleIncomingCartridge(message, send) {
  try {
    const result = await loadCart(message.cart);
    if (!result) {
      send({ type: 'error', version: PROTOCOL_VERSION, loadId: message.loadId, message: 'Load was superseded by a newer cartridge.' });
      return;
    }
    send({ type: 'rendered', version: PROTOCOL_VERSION, loadId: message.loadId, id: result.id, declared: result.declared, match: result.match, trust: result.trust });
    if (result.match) send({ type: 'hatched', version: PROTOCOL_VERSION, id: result.id, trust: result.trust });
    else send({ type: 'hash-mismatch', version: PROTOCOL_VERSION, got: result.id, declared: result.declared });
  } catch (error) {
    const messageText = error.message || String(error);
    setPlayerStatus(messageText, true);
    send({ type: 'error', version: PROTOCOL_VERSION, loadId: message.loadId, message: messageText });
  }
}

function handleProtocolMessage(message, send, dispose) {
  const version = message.version == null ? PROTOCOL_VERSION : message.version;
  if (version !== PROTOCOL_VERSION) {
    send({ type: 'protocol-error', version: PROTOCOL_VERSION, message: `Unsupported protocol version: ${version}.` });
    return;
  }
  if (message.type === 'cancel-loads') {
    beginLoad();
    send({ type: 'cancelled', version: PROTOCOL_VERSION });
    return;
  }
  if (message.type === 'dispose') {
    beginLoad();
    if (RAF) cancelAnimationFrame(RAF);
    RAF = null;
    send({ type: 'disposed', version: PROTOCOL_VERSION });
    dispose && dispose();
    return;
  }
  if (message.type === 'load-cartridge' && message.cart) {
    handleIncomingCartridge(message, send);
  }
}

window.addEventListener('message', e => {
  if (e.source !== window.parent || !e.data) return;
  if (e.data.type === 'hologram-init') {
    const port = e.ports[0] || null;
    if (!port) return;
    const version = e.data.version == null ? PROTOCOL_VERSION : e.data.version;
    if (version !== PROTOCOL_VERSION) {
      port.postMessage({ type: 'protocol-error', version: PROTOCOL_VERSION, message: `Unsupported protocol version: ${version}.` });
      port.close();
      return;
    }
    if (_pmPort) {
      beginLoad();
      _pmPort.onmessage = null;
      _pmPort.close();
    }
    _pmPort = port;
    const send = response => port.postMessage(response);
    const dispose = () => {
      if (_pmPort === port) _pmPort = null;
      port.onmessage = null;
      port.close();
    };
    port.onmessage = event => {
      if (event.data) handleProtocolMessage(event.data, send, dispose);
    };
    port.start && port.start();
    port.postMessage({
      type: 'ready',
      version: PROTOCOL_VERSION,
      capabilities: ['load-cartridge', 'cancel-loads', 'dispose', 'transactional-render']
    });
    return;
  }
  const targetOrigin = e.origin === 'null' ? '*' : e.origin;
  const send = response => e.source.postMessage(response, targetOrigin);
  handleProtocolMessage(e.data, send);
});
